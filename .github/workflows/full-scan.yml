name: Full Security Scan

on:
  workflow_call:

permissions:
  contents: read

jobs:
  secrets:
    name: Secrets (Gitleaks)
    runs-on: ubuntu-latest
    outputs:
      found: ${{ steps.summary.outputs.found }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Cache Gitleaks binary
        id: cache-gitleaks
        uses: actions/cache@v4
        with:
          path: ./gitleaks
          key: gitleaks-8.18.4-${{ runner.os }}

      - name: Download Gitleaks
        if: steps.cache-gitleaks.outputs.cache-hit != 'true'
        run: |
          VERSION="8.18.4"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          chmod +x gitleaks

      - name: Run Gitleaks
        run: |
          ./gitleaks detect \
            --source=. \
            --report-format=json \
            --report-path=gitleaks-report.json \
            --redact \
            --exit-code=0

      - name: Summarize
        id: summary
        if: always()
        run: |
          COUNT=$(jq 'if type=="array" then length else 0 end' gitleaks-report.json 2>/dev/null || echo 0)
          echo "### Secrets Scan (Gitleaks)" >> $GITHUB_STEP_SUMMARY
          if [ "$COUNT" -gt 0 ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo ":warning: **$COUNT potential secret(s) found**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Rule | File | Line |" >> $GITHUB_STEP_SUMMARY
            echo "|------|------|------|" >> $GITHUB_STEP_SUMMARY
            jq -r '.[] | "| \(.RuleID) | `\(.File)` | \(.StartLine) |"' gitleaks-report.json >> $GITHUB_STEP_SUMMARY
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo ":white_check_mark: No secrets found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          if-no-files-found: ignore

  ruby:
    name: Ruby/Rails (Brakeman)
    runs-on: ubuntu-latest
    outputs:
      found: ${{ steps.summary.outputs.found }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for Ruby project
        id: check
        run: |
          if [ -f "Gemfile" ]; then
            echo "skip=false" >> $GITHUB_OUTPUT
          else
            echo "skip=true" >> $GITHUB_OUTPUT
          fi

      - name: Setup Ruby
        if: steps.check.outputs.skip == 'false'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: false

      - name: Cache Brakeman gem
        if: steps.check.outputs.skip == 'false'
        id: cache-brakeman
        uses: actions/cache@v4
        with:
          path: /tmp/gems
          key: brakeman-${{ runner.os }}-v1

      - name: Install Brakeman
        if: steps.check.outputs.skip == 'false' && steps.cache-brakeman.outputs.cache-hit != 'true'
        run: GEM_HOME=/tmp/gems gem install brakeman --no-document -q

      - name: Ensure Brakeman is executable
        if: steps.check.outputs.skip == 'false'
        run: chmod +x /tmp/gems/bin/brakeman

      - name: Run Brakeman
        if: steps.check.outputs.skip == 'false'
        env:
          GEM_HOME: /tmp/gems
        run: |
          /tmp/gems/bin/brakeman \
            --no-progress \
            --format json \
            --output brakeman-report.json \
            --quiet \
            --no-exit-on-warn \
            --no-exit-on-error \
            . || true

      - name: Summarize
        id: summary
        if: always()
        run: |
          echo "### Ruby/Rails Scan (Brakeman)" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check.outputs.skip }}" == "true" ]; then
            echo "found=false" >> $GITHUB_OUTPUT
            echo ":white_check_mark: No Gemfile found — skipped" >> $GITHUB_STEP_SUMMARY
          elif [ -f "brakeman-report.json" ]; then
            COUNT=$(jq '.warnings | length' brakeman-report.json 2>/dev/null || echo 0)
            if [ "$COUNT" -gt 0 ]; then
              echo "found=true" >> $GITHUB_OUTPUT
              echo ":warning: **$COUNT warning(s) found**" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "| Type | Confidence | File | Line | Message |" >> $GITHUB_STEP_SUMMARY
              echo "|------|------------|------|------|---------|" >> $GITHUB_STEP_SUMMARY
              jq -r '.warnings[] | "| \(.warning_type) | \(.confidence) | `\(.file)` | \(.line // "-") | \(.message) |"' \
                brakeman-report.json >> $GITHUB_STEP_SUMMARY
            else
              echo "found=false" >> $GITHUB_OUTPUT
              echo ":white_check_mark: No warnings found" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo ":white_check_mark: No output produced — likely no Rails app detected" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload report
        if: always() && steps.check.outputs.skip == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: brakeman-report
          path: brakeman-report.json
          if-no-files-found: ignore

  javascript:
    name: JavaScript/Vue (ESLint Security)
    runs-on: ubuntu-latest
    outputs:
      found: ${{ steps.summary.outputs.found }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for JS/TS/Vue files
        id: check
        run: |
          if find . \( -name "*.js" -o -name "*.ts" -o -name "*.vue" \) \
               -not -path "./.git/*" \
               -not -path "./node_modules/*" \
               -not -path "./vendor/*" \
               | grep -q .; then
            echo "skip=false" >> $GITHUB_OUTPUT
          else
            echo "skip=true" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node
        if: steps.check.outputs.skip == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache ESLint packages
        if: steps.check.outputs.skip == 'false'
        id: cache-eslint
        uses: actions/cache@v4
        with:
          path: /tmp/eslint-scan/node_modules
          key: eslint-security-${{ runner.os }}-eslint8-security1

      - name: Setup ESLint config
        if: steps.check.outputs.skip == 'false'
        run: |
          mkdir -p /tmp/eslint-scan
          cat > /tmp/eslint-scan/.eslintrc.json << 'EOF'
          {
            "plugins": ["security"],
            "extends": ["plugin:security/recommended"],
            "env": { "browser": true, "node": true, "es2022": true },
            "parserOptions": { "ecmaVersion": 2022, "sourceType": "module" }
          }
          EOF

      - name: Install ESLint packages
        if: steps.check.outputs.skip == 'false' && steps.cache-eslint.outputs.cache-hit != 'true'
        run: |
          cd /tmp/eslint-scan
          npm init -y
          npm install --save-dev eslint@8 eslint-plugin-security@1

      - name: Ensure ESLint is executable
        if: steps.check.outputs.skip == 'false'
        run: chmod +x /tmp/eslint-scan/node_modules/.bin/eslint

      - name: Run ESLint
        if: steps.check.outputs.skip == 'false'
        run: |
          FILES=$(find "$GITHUB_WORKSPACE" \( -name "*.js" -o -name "*.ts" -o -name "*.vue" \) \
            -not -path "*/node_modules/*" \
            -not -path "*/vendor/*" \
            -not -path "*/.git/*" \
            | tr '\n' ' ')

          cd /tmp/eslint-scan
          ./node_modules/.bin/eslint \
            --format json \
            --no-eslintrc \
            --config .eslintrc.json \
            --resolve-plugins-relative-to /tmp/eslint-scan \
            $FILES > "$GITHUB_WORKSPACE/eslint-report.json" 2>&1 || true

      - name: Summarize
        id: summary
        if: always()
        run: |
          echo "### JavaScript/Vue Scan (ESLint Security)" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check.outputs.skip }}" == "true" ]; then
            echo "found=false" >> $GITHUB_OUTPUT
            echo ":white_check_mark: No JS/TS/Vue files found — skipped" >> $GITHUB_STEP_SUMMARY
          elif [ -f "eslint-report.json" ]; then
            PROBLEMS=$(jq '[.[] | .messages | length] | add // 0' eslint-report.json 2>/dev/null || echo 0)
            if [ "$PROBLEMS" -gt 0 ]; then
              echo "found=true" >> $GITHUB_OUTPUT
              echo ":warning: **$PROBLEMS issue(s) found**" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "| Rule | File | Line | Message |" >> $GITHUB_STEP_SUMMARY
              echo "|------|------|------|---------|" >> $GITHUB_STEP_SUMMARY
              jq -r '.[] | select(.messages | length > 0) | .filePath as $f | .messages[] |
                "| \(.ruleId // "unknown") | `\($f | split("/") | last)` | \(.line) | \(.message) |"' \
                eslint-report.json >> $GITHUB_STEP_SUMMARY
            else
              echo "found=false" >> $GITHUB_OUTPUT
              echo ":white_check_mark: No issues found" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo ":warning: ESLint did not produce output" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload report
        if: always() && steps.check.outputs.skip == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: eslint-report
          path: eslint-report.json
          if-no-files-found: ignore

  python:
    name: Python (Bandit)
    runs-on: ubuntu-latest
    outputs:
      found: ${{ steps.summary.outputs.found }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for Python files
        id: check
        run: |
          if find . -name "*.py" \
               -not -path "./.git/*" \
               -not -path "./node_modules/*" \
               -not -path "./vendor/*" \
               | grep -q .; then
            echo "skip=false" >> $GITHUB_OUTPUT
          else
            echo "skip=true" >> $GITHUB_OUTPUT
          fi

      - name: Setup Python
        if: steps.check.outputs.skip == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Cache pip packages
        if: steps.check.outputs.skip == 'false'
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: bandit-${{ runner.os }}-v1

      - name: Install Bandit
        if: steps.check.outputs.skip == 'false'
        run: pip install bandit -q

      - name: Run Bandit
        if: steps.check.outputs.skip == 'false'
        run: |
          bandit \
            --recursive . \
            --format json \
            --output bandit-report.json \
            --severity-level medium \
            --confidence-level medium \
            --exclude ./.git,./node_modules,./vendor \
            || true

      - name: Summarize
        id: summary
        if: always()
        run: |
          echo "### Python Scan (Bandit)" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check.outputs.skip }}" == "true" ]; then
            echo "found=false" >> $GITHUB_OUTPUT
            echo ":white_check_mark: No Python files found — skipped" >> $GITHUB_STEP_SUMMARY
          elif [ -f "bandit-report.json" ]; then
            COUNT=$(jq '.results | length' bandit-report.json 2>/dev/null || echo 0)
            if [ "$COUNT" -gt 0 ]; then
              echo "found=true" >> $GITHUB_OUTPUT
              echo ":warning: **$COUNT issue(s) found**" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "| Test ID | Severity | File | Line | Issue |" >> $GITHUB_STEP_SUMMARY
              echo "|---------|----------|------|------|-------|" >> $GITHUB_STEP_SUMMARY
              jq -r '.results[] | "| \(.test_id) | \(.issue_severity) | `\(.filename | split("/") | last)` | \(.line_number) | \(.issue_text) |"' \
                bandit-report.json >> $GITHUB_STEP_SUMMARY
            else
              echo "found=false" >> $GITHUB_OUTPUT
              echo ":white_check_mark: No issues found" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo ":white_check_mark: No output produced" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload report
        if: always() && steps.check.outputs.skip == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json
          if-no-files-found: ignore

  report:
    name: Send Discord Report
    runs-on: ubuntu-latest
    needs: [secrets, ruby, javascript, python]
    if: always()
    steps:
      - name: Download all scan reports
        uses: actions/download-artifact@v4
        with:
          path: reports
          merge-multiple: true
        continue-on-error: true

      - name: Generate HTML report
        run: |
          cat > generate_report.py << 'PYEOF'
          import json, os
          from datetime import date

          today = date.today().strftime('%B %d, %Y')

          def load_json(path):
              try:
                  with open(path) as f:
                      return json.load(f)
              except (FileNotFoundError, json.JSONDecodeError):
                  return None

          def table(headers, rows):
              ths = ''.join(f'<th>{h}</th>' for h in headers)
              trs = ''.join('<tr>' + ''.join(f'<td>{c}</td>' for c in row) + '</tr>' for row in rows)
              return f'<table><thead><tr>{ths}</tr></thead><tbody>{trs}</tbody></table>'

          results = {}

          # Gitleaks
          data = load_json('reports/gitleaks-report.json')
          if data is None:
              results['Secrets'] = ('skip', 'Gitleaks', None, '')
          elif not data:
              results['Secrets'] = ('ok', 'Gitleaks', 0, '')
          else:
              rows = [[r['RuleID'], f'<span class="mono">{r["File"]}</span>', str(r['StartLine'])] for r in data]
              results['Secrets'] = ('warn', 'Gitleaks', len(data), table(['Rule', 'File', 'Line'], rows))

          # Brakeman
          data = load_json('reports/brakeman-report.json')
          if data is None:
              results['Ruby/Rails'] = ('skip', 'Brakeman', None, '')
          else:
              warnings = data.get('warnings', [])
              if not warnings:
                  results['Ruby/Rails'] = ('ok', 'Brakeman', 0, '')
              else:
                  rows = [[w['warning_type'], w['confidence'], f'<span class="mono">{w["file"]}</span>', str(w.get('line', '-')), w['message']] for w in warnings]
                  results['Ruby/Rails'] = ('warn', 'Brakeman', len(warnings), table(['Type', 'Confidence', 'File', 'Line', 'Message'], rows))

          # ESLint
          data = load_json('reports/eslint-report.json')
          if data is None:
              results['JavaScript/Vue'] = ('skip', 'ESLint Security', None, '')
          else:
              rows = []
              for f in data:
                  fname = f['filePath'].split('/')[-1]
                  for m in f.get('messages', []):
                      rows.append([m.get('ruleId', ''), f'<span class="mono">{fname}</span>', str(m.get('line', '')), m.get('message', '')])
              if not rows:
                  results['JavaScript/Vue'] = ('ok', 'ESLint Security', 0, '')
              else:
                  results['JavaScript/Vue'] = ('warn', 'ESLint Security', len(rows), table(['Rule', 'File', 'Line', 'Message'], rows))

          # Bandit
          data = load_json('reports/bandit-report.json')
          if data is None:
              results['Python'] = ('skip', 'Bandit', None, '')
          else:
              findings = data.get('results', [])
              if not findings:
                  results['Python'] = ('ok', 'Bandit', 0, '')
              else:
                  rows = [[r['test_id'], r['issue_severity'], f'<span class="mono">{r["filename"].split("/")[-1]}</span>', str(r['line_number']), r['issue_text']] for r in findings]
                  results['Python'] = ('warn', 'Bandit', len(findings), table(['Test ID', 'Severity', 'File', 'Line', 'Issue'], rows))

          any_found = any(s == 'warn' for s, *_ in results.values())

          # Summary table
          summary_rows = ''
          for lang, (status, tool, count, _) in results.items():
              if status == 'skip':
                  badge = '<span class="badge skip">SKIPPED</span>'
              elif status == 'ok':
                  badge = '<span class="badge ok">CLEAN</span>'
              else:
                  badge = f'<span class="badge warn">{count} ISSUE(S)</span>'
              summary_rows += f'<tr><td>{lang}</td><td>{tool}</td><td>{badge}</td></tr>'

          # Detail sections
          details = ''
          for lang, (status, tool, count, html) in results.items():
              if status == 'warn':
                  details += f'''
                  <div class="section">
                    <h2><span class="warn-icon">⚠</span> {lang} — {tool} <span class="count">({count} issue(s))</span></h2>
                    {html}
                  </div>'''

          overall_class = 'overall-warn' if any_found else 'overall-ok'
          overall_text  = 'Issues Found' if any_found else 'All Clear'

          html = f"""<!DOCTYPE html>
          <html>
          <head>
          <meta charset="utf-8">
          <style>
            body {{ font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 48px; color: #111827; font-size: 13px; line-height: 1.5; }}
            h1 {{ font-size: 24px; font-weight: 700; margin: 0 0 4px; }}
            .date {{ color: #6b7280; margin-bottom: 8px; }}
            .overall-ok  {{ display: inline-block; background: #dcfce7; color: #166534; padding: 4px 14px; border-radius: 20px; font-weight: 600; margin-bottom: 28px; }}
            .overall-warn {{ display: inline-block; background: #fee2e2; color: #991b1b; padding: 4px 14px; border-radius: 20px; font-weight: 600; margin-bottom: 28px; }}
            h2 {{ font-size: 15px; margin: 0 0 12px; display: flex; align-items: center; gap: 8px; }}
            .warn-icon {{ color: #dc2626; }}
            .count {{ color: #6b7280; font-weight: 400; font-size: 13px; }}
            table {{ border-collapse: collapse; width: 100%; margin-bottom: 8px; font-size: 12px; }}
            th {{ background: #f9fafb; text-align: left; padding: 7px 12px; border: 1px solid #e5e7eb; font-weight: 600; text-transform: uppercase; font-size: 11px; letter-spacing: 0.04em; }}
            td {{ padding: 6px 12px; border: 1px solid #e5e7eb; vertical-align: top; }}
            tr:nth-child(even) td {{ background: #f9fafb; }}
            .mono {{ font-family: 'SFMono-Regular', Consolas, monospace; font-size: 11px; }}
            .badge {{ display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }}
            .badge.ok   {{ background: #dcfce7; color: #166534; }}
            .badge.warn {{ background: #fee2e2; color: #991b1b; }}
            .badge.skip {{ background: #f3f4f6; color: #6b7280; }}
            .section {{ margin-top: 36px; padding-top: 20px; border-top: 1px solid #e5e7eb; page-break-inside: avoid; }}
            .all-clear {{ color: #166534; background: #dcfce7; padding: 20px; border-radius: 8px; margin-top: 24px; font-weight: 500; }}
            .footer {{ margin-top: 48px; font-size: 11px; color: #9ca3af; border-top: 1px solid #e5e7eb; padding-top: 12px; }}
          </style>
          </head>
          <body>
            <h1>Security Scan Report</h1>
            <div class="date">{today}</div>
            <div class="{overall_class}">{overall_text}</div>
            <table>
              <thead><tr><th>Language</th><th>Tool</th><th>Result</th></tr></thead>
              <tbody>{summary_rows}</tbody>
            </table>
            {''.join([details]) if any_found else '<div class="all-clear">All scanners passed. No security issues detected in this run.</div>'}
            <div class="footer">Generated by automated nightly security scanner</div>
          </body>
          </html>"""

          with open('report.html', 'w') as f:
              f.write(html)
          PYEOF
          python3 generate_report.py

      - name: Convert to PDF
        run: |
          google-chrome-stable \
            --headless \
            --disable-gpu \
            --run-all-compositor-stages-before-draw \
            --print-to-pdf="$GITHUB_WORKSPACE/security-report.pdf" \
            --no-pdf-header-footer \
            "file://$GITHUB_WORKSPACE/report.html"

      - name: Send to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.SECURITY_SCANNER_DISCORD_WEBHOOK }}
        run: |
          TODAY=$(date +%Y-%m-%d)
          curl -X POST \
            -F "payload_json={\"content\": \"Security scan completed — ${TODAY}\"}" \
            -F "file=@$GITHUB_WORKSPACE/security-report.pdf;type=application/pdf" \
            "$DISCORD_WEBHOOK_URL"
